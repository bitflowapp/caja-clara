name: Caja Clara Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FLUTTER_CHANNEL: stable
  BASE_HREF: ${{ vars.BASE_HREF || '/caja-clara/' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Flutter pub get
        run: flutter pub get

      - name: Prepare build metadata
        run: |
          echo "CAJA_CLARA_BUILD_SHA=$GITHUB_SHA" >> $GITHUB_ENV
          echo "CAJA_CLARA_BUILD_SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "CAJA_CLARA_BUILD_BRANCH=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "CAJA_CLARA_BUILD_TIME_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
          echo "CAJA_CLARA_BUILD_SOURCE=github-actions" >> $GITHUB_ENV

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: |
          flutter build web --release \
            --base-href "${{ env.BASE_HREF }}" \
            --pwa-strategy offline-first \
            --dart-define=CAJA_CLARA_BUILD_SHA=${{ env.CAJA_CLARA_BUILD_SHA }} \
            --dart-define=CAJA_CLARA_BUILD_SHORT_SHA=${{ env.CAJA_CLARA_BUILD_SHORT_SHA }} \
            --dart-define=CAJA_CLARA_BUILD_BRANCH=${{ env.CAJA_CLARA_BUILD_BRANCH }} \
            --dart-define=CAJA_CLARA_BUILD_TIME_UTC=${{ env.CAJA_CLARA_BUILD_TIME_UTC }} \
            --dart-define=CAJA_CLARA_BUILD_SOURCE=${{ env.CAJA_CLARA_BUILD_SOURCE }}

      - name: Write version marker
        run: |
          cat > build/web/version.json <<EOF
          {
            "commitSha": "${{ env.CAJA_CLARA_BUILD_SHA }}",
            "shortCommitSha": "${{ env.CAJA_CLARA_BUILD_SHORT_SHA }}",
            "branch": "${{ env.CAJA_CLARA_BUILD_BRANCH }}",
            "builtAtUtc": "${{ env.CAJA_CLARA_BUILD_TIME_UTC }}",
            "source": "${{ env.CAJA_CLARA_BUILD_SOURCE }}",
            "baseHref": "${{ env.BASE_HREF }}"
          }
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
